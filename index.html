
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS AI Chatbot</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-box {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user {
            background: #2563eb;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #e5e7eb;
            color: black;
        }

        .sources {
            margin-top: 8px;
            font-size: 12px;
            color: #444;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .loading {
            color: gray;
            font-style: italic;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="header">
        SWS AI Policy Chatbot
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            Hello! Ask me anything about SWS AI company policies.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="questionInput"
            placeholder="Ask a question..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

async function sendMessage() {

    const input = document.getElementById("questionInput");
    const chatBox = document.getElementById("chatBox");

    const question = input.value.trim();

    if (!question) {
        return;
    }

    // USER MESSAGE
    const userMessage = document.createElement("div");
    userMessage.className = "message user";
    userMessage.innerText = question;

    chatBox.appendChild(userMessage);

    // CLEAR INPUT
    input.value = "";

    // LOADING MESSAGE
    const loading = document.createElement("div");
    loading.className = "loading";
    loading.id = "loading";
    loading.innerText = "AI is typing...";

    chatBox.appendChild(loading);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {

        const response = await fetch(
            "http://127.0.0.1:8000/api/chat",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    question: question
                })
            }
        );

        const data = await response.json();

        // REMOVE LOADING
        document.getElementById("loading").remove();

        // BOT MESSAGE
        const botMessage = document.createElement("div");
        botMessage.className = "message bot";

        botMessage.innerHTML = `
            <div>${data.answer}</div>
            <div class="sources">
                <b>Sources:</b> ${data.sources.join(", ")}
            </div>
        `;

        chatBox.appendChild(botMessage);

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {

        document.getElementById("loading").remove();

        const errorMessage = document.createElement("div");
        errorMessage.className = "message bot";
        errorMessage.innerText = "Error connecting to chatbot backend.";

        chatBox.appendChild(errorMessage);
    }
}

// PRESS ENTER TO SEND

document.getElementById("questionInput")
.addEventListener("keypress", function(event) {

    if (event.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>
